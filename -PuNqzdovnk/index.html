<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flip Dimension YouTube Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center text-white">

  <div class="scene relative">
    <div class="ambient-ring"></div>

    <div class="card-3d">
      <div class="depth-layer-3"></div>
      <div class="depth-layer-2"></div>
      <div class="depth-layer-1"></div>

      <div class="face front">
        <div class="core-icon">
          <svg viewBox="0 0 24 24" class="w-8 h-8 fill-white">
            <path d="M23.5 6.2s-.2-1.7-.8-2.5c-.8-.9-1.6-.9-2-1C17.8 2.4 12 2.4 12 2.4s-5.8 0-8.7.3c-.4.1-1.2.1-2 1C.7 4.5.5 6.2.5 6.2S.2 8.2.2 10.2v1.6c0 2 .3 4 .3 4s.2 1.7.8 2.5c.8.9 1.9.9 2.4 1 1.7.2 7.3.3 7.3.3s5.8 0 8.7-.3c.4-.1 1.2-.1 2-1 .6-.8.8-2.5.8-2.5s.3-2 .3-4v-1.6c0-2-.3-4-.3-4zM9.7 14.6V7.8l6.5 3.4-6.5 3.4z"/>
          </svg>
        </div>
        <div class="front-label">YouTube</div>
      </div>

      <div class="face back">
        <div class="content">
          <div class="profile-top">
            <div class="avatar-wrap">
              <div class="avatar">
                <svg viewBox="0 0 24 24" class="w-7 h-7 fill-red-400">
                  <path d="M23.5 6.2s-.2-1.7-.8-2.5c-.8-.9-1.6-.9-2-1C17.8 2.4 12 2.4 12 2.4s-5.8 0-8.7.3c-.4.1-1.2.1-2 1C.7 4.5.5 6.2.5 6.2S.2 8.2.2 10.2v1.6c0 2 .3 4 .3 4s.2 1.7.8 2.5c.8.9 1.9.9 2.4 1 1.7.2 7.3.3 7.3.3s5.8 0 8.7-.3c.4-.1 1.2-.1 2-1 .6-.8.8-2.5.8-2.5s.3-2 .3-4v-1.6c0-2-.3-4-.3-4zM9.7 14.6V7.8l6.5 3.4-6.5 3.4z"/>
                </svg>
              </div>

              <div>
                <p class="text-[10px] uppercase tracking-[0.25em] text-red-300/70">Creator Profile</p>
                <h2 class="mt-1 text-xl font-semibold">@codeWithAhmadYT</h2>
                <p class="text-sm text-zinc-400">Full Stack Developer</p>
              </div>
            </div>

            <div class="badge">Live</div>
          </div>

          <div class="stats">
            <div class="stat">
              <div class="stat-label">Subscribers</div>
              <div class="stat-value">30.5K</div>
            </div>
            <div class="stat">
              <div class="stat-label">Videos</div>
              <div class="stat-value">10</div>
            </div>
            <div class="stat">
              <div class="stat-label">Views</div>
              <div class="stat-value">100K</div>
            </div>
          </div>

          <div class="bottom-bar">
            <div class="progress"><span></span></div>
            <div class="text-xs uppercase tracking-[0.2em] text-red-300/70">Subscribe</div>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
